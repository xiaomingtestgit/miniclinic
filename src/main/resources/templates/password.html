<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 420px; margin: 80px auto; padding: 0 20px; }
        h1 { color: #0F2443; text-align: center; }
        .field { margin: 16px 0; }
        label { display: block; font-weight: bold; color: #0F2443; margin-bottom: 6px; }
        input { width: 100%; padding: 10px; border: 1px solid #E2E8F0; border-radius: 4px; font-size: 14px; }
        .error { color: #DC2626; font-size: 13px; margin-top: 4px; }
        .alert { background: #FEE2E2; color: #991B1B; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        .success { background: #DCFCE7; color: #166534; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        button { width: 100%; background: #14B8A6; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; margin-top: 12px; }
        button:hover { background: #0D9488; }
        .helper { text-align: center; margin-top: 16px; }
        .helper a { color: #0F2443; text-decoration: none; }
    </style>
</head>
<body>
    <h1>修改密碼</h1>

    <p th:if="${loggedInDoctorName}">醫師：<strong th:text="${loggedInDoctorName}"></strong></p>

    <div class="alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <form th:action="@{/password}" th:object="${passwordForm}" method="post">
        <div class="field">
            <label>舊密碼</label>
            <input type="password" th:field="*{oldPassword}">
            <div class="error" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
        </div>

        <div class="field">
            <label>新密碼</label>
            <input type="password" th:field="*{newPassword}">
            <div class="error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>

        <div class="field">
            <label>確認新密碼</label>
            <input type="password" th:field="*{confirmPassword}">
            <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>

        <button type="submit">更新密碼</button>
    </form>

    <p class="helper">
        <a th:href="@{/dashboard}">← 返回 Dashboard</a>
    </p>
</body>
</html>
